<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form</title>

  <style>
    body{
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
      background:#f0f2f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-container{
      background:white;
      padding:30px;
      width:350px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
      margin-bottom:25px;
      color:#333;
    }

    .input-group{
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-bottom:5px;
      font-weight:bold;
    }

    input{
      width:100%;
      padding:10px;
      border:1px solid #ccc;
      border-radius:5px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:12px;
      background:#007bff;
      color:white;
      border:none;
      border-radius:5px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }

    .links{
      text-align:center;
      margin-top:15px;
    }

    .links a{
      text-decoration:none;
      color:#007bff;
      font-size:14px;
    }

    .links a:hover{
      text-decoration:underline;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h2>Login</h2>

    <form>

      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
      </div>

      <button type="submit">Login</button>

      <div class="links">
        <p><a href="#">Forgot Password?</a></p>
        <p><a href="#">Create Account</a></p>
      </div>

    </form>
  </div>

</body>
</html>
