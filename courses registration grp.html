<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Registration Form</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#eef2f7;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .container{
      background:white;
      width:450px;
      padding:30px;
      border-radius:10px;
      box-shadow:0 0 15px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
      color:#333;
      margin-bottom:25px;
    }

    .input-group{
      margin-bottom:18px;
    }

    label{
      display:block;
      margin-bottom:6px;
      font-weight:bold;
    }

    input, select, textarea{
      width:100%;
      padding:10px;
      border:1px solid #ccc;
      border-radius:5px;
      font-size:15px;
    }

    textarea{
      resize:none;
      height:80px;
    }

    .radio-group{
      display:flex;
      gap:15px;
      margin-top:5px;
    }

    button{
      width:100%;
      padding:12px;
      background:#007bff;
      color:white;
      border:none;
      border-radius:5px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Course Registration Form</h2>

    <form>

      <div class="input-group">
        <label>Student Full Name</label>
        <input type="text" placeholder="Enter full name" required>
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <input type="email" placeholder="Enter email" required>
      </div>

      <div class="input-group">
        <label>Phone Number</label>
        <input type="tel" placeholder="Enter phone number" required>
      </div>

      <div class="input-group">
        <label>Student ID</label>
        <input type="text" placeholder="Enter student ID" required>
      </div>

      <div class="input-group">
        <label>Select Course</label>

        <select required>
          <option value="">Choose Course</option>
          <option>Web Development</option>
          <option>Networking</option>
          <option>Software Engineering</option>
          <option>Graphic Design</option>
          <option>Cyber Security</option>
        </select>
      </div>

      <div class="input-group">
        <label>Study Mode</label>

        <div class="radio-group">
          <label><input type="radio" name="mode"> Online</label>
          <label><input type="radio" name="mode"> Physical</label>
        </div>
      </div>

      <div class="input-group">
        <label>Why do you want this course?</label>
        <textarea placeholder="Write your reason..."></textarea>
      </div>

      <button type="submit">Register Course</button>

    </form>
  </div>

</body>
</html>
